<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confession - Fatzsukasiapaya</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: all 0.3s ease;
        }
        h1 {
            color: #ff4d6d;
            margin-bottom: 20px;
            font-size: 24px;
        }
        p {
            color: #4a4a4a;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn-group {
            display: flex;
            justify-content: space-around;
            position: relative;
            height: 50px;
        }
        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #btn-yes {
            background-color: #ff4d6d;
            color: white;
        }
        #btn-no {
            background-color: #7f8c8d;
            color: white;
            position: absolute;
            right: 30px;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #a0a0a0;
        }
    </style>
</head>
<body>

    <div class="container" id="card">
        <h1 id="headline">Hai! Ada pesan dari Fatzsukasiapaya...</h1>
        <p id="message">Aku mau jujur, sebenarnya aku suka sama kamu sejak lama. Kamu mau gak jadi pacar aku? 🥺👉👈</p>
        
        <div class="btn-group">
            <button id="btn-yes" onclick="terima()">Mau!</button>
            <button id="btn-no" onmouseover="hindari()" onclick="hindari()">Enggak</button>
        </div>
        
        <div class="footer">Made by Fatzsukasiapaya</div>
    </div>

    <script>
        function terima() {
            document.getElementById('headline').innerHTML = "Yesss! 🎉❤️";
            document.getElementById('message').innerHTML = "Makasih ya udah mau nerima Fatzsukasiapaya! Chat aku sekarang yaa, bilang kalau kamu terima! 🥰";
            document.querySelector('.btn-group').style.display = 'none';
        }

        function hindari() {
            const btnNo = document.getElementById('btn-no');
            
            // Menghitung posisi acak agar tombol "Enggak" tidak bisa diklik
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 50);
            
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }
    </script>
</body>
</html>
